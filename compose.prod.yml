services:
  postgres:
    image: postgres:18.4-alpine3.24
   
    env_file:
      - .env.prod
    networks:
      - url_shortener
    container_name: postgres
    volumes:
      - url_shortener:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 10
  redis:
    image: redis
 
    container_name: redis
    networks:
      - url_shortener
    depends_on:
      - postgres
  url_shortener:
    build: .
    
    expose:
      - 8000
    env_file:
      - .env.prod
    networks:
      - url_shortener
    container_name: url_shortener
    depends_on:
      
      postgres:
        condition: service_healthy    
      redis:
        condition: service_started
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
  web:
    image: nginx:alpine
    ports:
      - 80:80
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - url_shortener
    depends_on:
      url_shortener:
        condition: service_started

networks:
  url_shortener:
    name: url_shortener
    driver: bridge
volumes:
    url_shortener:
      driver: local
