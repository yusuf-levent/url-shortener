services:
  postgres:
    image: postgres:18.4-alpine3.24  
    env_file:
      - .env.test
    networks:
      - url_shortener
    container_name: postgres
    volumes:
      - url_shortener_test:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL","pg_isready -U postgres -d url_shortener"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  web:
    image: nginx
    ports:
    - 80:80
    networks:
      - url_shortener
    volumes:
      - ./nginx/default.test.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: 
      url_shortener:
        condition: service_started

  redis_test:
    image: redis
    
    networks:
     - url_shortener
    depends_on:
     - postgres
    container_name: redis_test

  url_shortener:
    build: .
    volumes:
     - .:/app
    networks:
     - url_shortener
    env_file:
     - .env.test
    depends_on:
      postgres:
        condition: service_healthy
      redis_test:
        condition:  service_started
  test:
    build: .
    networks:
      - url_shortener
    env_file:
      - .env.test
    command: pytest 
    depends_on:
     web:
      condition: service_started


networks:
  url_shortener:
    name: url_shortener
    driver: bridge
volumes:
    url_shortener_test:
      driver: local
   